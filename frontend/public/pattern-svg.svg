<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <!-- Template for Dachshund -->
    <g id="dachshund" fill="#000000">
      <rect x="30" y="35" width="60" height="18" rx="9" />
      <circle cx="85" cy="28" r="12" />
      <rect x="85" y="25" width="22" height="10" rx="5" />
      <path d="M 80 25 L 88 25 A 5 5 0 0 1 93 30 L 93 42 A 5 5 0 0 1 83 42 L 80 25" />
      <path d="M 35 44 Q 20 30 25 18" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round" />
      <rect x="38" y="50" width="7" height="15" rx="3.5" />
      <rect x="48" y="48" width="7" height="12" rx="3.5" />
      <rect x="70" y="50" width="7" height="15" rx="3.5" />
      <rect x="80" y="48" width="7" height="12" rx="3.5" />
      <path d="M 75 30 L 85 30 L 85 45 L 75 45 Z" />
    </g>

    <!-- Template for Heart (escalado original base para luego ampliarlo) -->
    <g id="heart" fill="#000000">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </g>

    <!-- Template for Panda (Mejorado y adorable) -->
    <g id="panda" fill="#000000">
      <circle cx="20" cy="25" r="12" />
      <circle cx="80" cy="25" r="12" />
      <circle cx="50" cy="50" r="35" fill="none" stroke="#000000" stroke-width="6"/>
      <ellipse cx="35" cy="45" rx="10" ry="14" transform="rotate(-30 35 45)"/>
      <ellipse cx="65" cy="45" rx="10" ry="14" transform="rotate(30 65 45)"/>
      <circle cx="50" cy="62" r="4"/>
      <path d="M 45 68 C 45 74 55 74 55 68" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Template for Penguin (Mejorado y detallado) -->
    <g id="penguin" fill="#000000">
      <path d="M 50 10 C 20 10 20 50 20 80 Q 20 95 50 95 Q 80 95 80 80 C 80 50 80 10 50 10 Z" fill="none" stroke="#000000" stroke-width="6"/>
      <path d="M 50 25 C 35 25 30 50 30 75 Q 30 85 50 85 Q 70 85 70 75 C 70 50 65 25 50 25 Z" fill="none" stroke="#000000" stroke-width="2"/>
      <circle cx="40" cy="35" r="4" />
      <circle cx="60" cy="35" r="4" />
      <polygon points="45,45 55,45 50,55" />
      <path d="M 20 45 C -5 65 10 85 18 70" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
      <path d="M 80 45 C 105 65 90 85 82 70" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="35" cy="95" rx="10" ry="5" />
      <ellipse cx="65" cy="95" rx="10" ry="5" />
    </g>
  </defs>

  <!-- Row 1 -->
  <use href="#dachshund" x="30" y="30" transform="scale(1.2)" opacity="0.6" />
  <use href="#panda" x="220" y="30" transform="scale(0.8)" opacity="0.5" />
  
  <!-- Row 2 -->
  <use href="#heart" x="35" y="55" transform="scale(3.5)" opacity="0.4" />
  <use href="#penguin" x="300" y="140" transform="scale(0.9)" opacity="0.55" />

  <!-- Row 3 -->
  <use href="#panda" x="40" y="280" transform="scale(0.8)" opacity="0.5" />
  <use href="#dachshund" x="200" y="250" transform="scale(1.2)" opacity="0.6" />

  <!-- Row 4 -->
  <use href="#penguin" x="120" y="350" transform="scale(0.9)" opacity="0.55" />
  <use href="#heart" x="100" y="105" transform="scale(3.5)" opacity="0.4" />
</svg>
